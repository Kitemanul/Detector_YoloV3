[Common]
# Directory containing the neural-network files (voc.names, yolov3-voc.cfg,
# *.weights). Leave empty to use the executable's working directory.
# Example: NNCfg_Dir=D:\cfg\
NNCfg_Dir=.\nncfg\

# Directory where violation snapshots are written.
# Example: DetectedFrameDir=D:\test\
DetectedFrameDir=.\result\

# Frame interval between two detections (source assumed ~24 fps), i.e. process
# roughly one frame per second by default.
Interval=24

# Frame interval applied after a target has been detected (~24 fps).
DInterval=24

# Detection confidence threshold (0.0 - 1.0).
Threshold=0.9

# --- Database configuration ---
# Data source; "(local)" means the local SQL Server instance.
DataSource=(local)
DB_Name=SecurityDetection
DB_User=sa
# Do NOT commit real credentials. Override locally for your environment.
DB_Password=CHANGE_ME
